<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Done For You Marketing</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #F5F2EA;
      color: #6B756B;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .lp-nav {
      background: #fff;
      border-bottom: 1px solid rgba(31,61,44,0.10);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-wordmark {
      display: flex;
      align-items: baseline;
      gap: 7px;
      text-decoration: none;
    }
    .nav-wordmark-serif {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 19px;
      font-weight: 500;
      color: #1F3D2C;
    }
    .nav-wordmark-sans {
      font-size: 10px;
      font-weight: 600;
      color: #2D6B4F;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .lp-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
    }

    .ty-icon {
      width: 72px;
      height: 72px;
      background: rgba(45,107,79,0.10);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      color: #2D6B4F;
    }

    .ty-headline {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 38px;
      font-weight: 500;
      color: #1F3D2C;
      line-height: 1.2;
      margin-bottom: 16px;
      max-width: 560px;
    }

    .ty-sub {
      font-size: 16px;
      color: #6B756B;
      line-height: 1.65;
      max-width: 440px;
      margin: 0 auto 40px;
    }

    .ty-divider {
      width: 48px;
      height: 2px;
      background: #EBC99B;
      border-radius: 2px;
      margin: 0 auto 40px;
    }

    .ty-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #2D6B4F;
      text-decoration: none;
      border-bottom: 1px solid rgba(45,107,79,0.3);
      padding-bottom: 2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .ty-back:hover { color: #1F3D2C; border-color: rgba(31,61,44,0.4); }

    .lp-footer {
      background: #1F3D2C;
      padding: 24px 40px;
      text-align: center;
    }
    .lp-footer p {
      font-size: 12px;
      color: rgba(245,242,234,0.45);
    }
    .lp-footer a {
      color: rgba(235,201,155,0.7);
      text-decoration: none;
    }
    .lp-footer a:hover { color: #EBC99B; }

    @media (max-width: 600px) {
      .ty-headline { font-size: 28px; }
      .ty-sub { font-size: 14px; }
    }
  </style>
</head>
<body>

  <nav class="lp-nav">
    <a href="https://dfymarketinggroup.com" class="nav-wordmark">
      <span class="nav-wordmark-serif">Done For You</span>
      <span class="nav-wordmark-sans">Marketing</span>
    </a>
  </nav>

  <main class="lp-main">

    <div class="ty-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <h1 class="ty-headline">We've got your info — someone will be in touch shortly.</h1>

    <div class="ty-divider"></div>

    <p class="ty-sub">Thank you for reaching out. Our team will review your Google Business Profile and get back to you with your free audit results.</p>

    <a href="https://dfymarketinggroup.com" class="ty-back">
      ← Back to dfymarketinggroup.com
    </a>

  </main>

  <footer class="lp-footer">
    <p>&copy; 2026 Done For You Marketing &mdash; <a href="https://dfymarketinggroup.com">dfymarketinggroup.com</a></p>
  </footer>

  <script src="https://beta.leadconnectorhq.com/loader.js" data-resources-url="https://beta.leadconnectorhq.com/chat-widget/loader.js" data-widget-id="6a21e1dc384d3095010738c4"></script>
</body>
</html>
