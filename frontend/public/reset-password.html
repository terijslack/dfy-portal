<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — DFY Marketing</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <style>
    .login-page { flex-direction: column; gap: 0; }
    .login-brand { margin-bottom: 0; padding-top: 48px; }
  </style>
</head>
<body class="login-page">

  <div class="login-brand">
    <a href="/"><img src="/logo-full-transparent.png" alt="DFY Marketing" class="brand-logo" style="height:250px;"></a>
  </div>

  <div class="login-container">
    <form class="login-form" id="resetForm">
      <h1 class="login-title">Choose a new password</h1>
      <p class="login-subtitle">Must be at least 8 characters.</p>

      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" placeholder="••••••••" required minlength="8" autocomplete="new-password" />
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="8" autocomplete="new-password" />
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button type="submit" class="btn-primary" id="submitBtn">Update password</button>

      <div class="login-back">
        <a href="/login.html" class="login-back-link">← Back to sign in</a>
      </div>
    </form>

    <div id="invalidToken" style="display:none;" class="login-form" style="text-align:center;">
      <p style="color:#7D2A03;margin-bottom:16px;">This reset link is invalid or has expired.</p>
      <a href="/forgot-password.html" class="btn-primary" style="display:block;text-align:center;text-decoration:none;">Request a new link</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('invalidToken').style.display = 'block';
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('submitBtn');

      errorMsg.textContent = '';

      if (password !== confirm) {
        errorMsg.textContent = 'Passwords do not match.';
        return;
      }

      btn.textContent = 'Updating…';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.error || 'Something went wrong.';
          btn.textContent = 'Update password';
          btn.disabled = false;
          if (data.error && data.error.includes('invalid or has expired')) {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('invalidToken').style.display = 'block';
          }
          return;
        }

        btn.textContent = 'Password updated!';
        setTimeout(() => { window.location.href = '/login.html'; }, 1500);

      } catch (err) {
        errorMsg.textContent = 'Something went wrong. Try again.';
        btn.textContent = 'Update password';
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
