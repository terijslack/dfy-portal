<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Done For You Marketing</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    .create-account-page {
      min-height: 100vh;
      background: #F5F2EA;
      font-family: 'Inter', sans-serif;
      padding-bottom: 80px;
    }

    /* ── Header ── */
    .ca-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 32px 24px 0;
    }

    .ca-logo {
      height: 250px;
      width: auto;
      margin-bottom: 8px;
    }

    .ca-back {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: #9AA199;
      text-decoration: none;
      margin-top: 4px;
      transition: color 0.15s;
    }

    .ca-back:hover {
      color: #2D6B4F;
    }

    .ca-selected-plan {
      font-size: 13px;
      color: #6B756B;
      margin: 6px 0 0;
    }

    .ca-selected-plan strong {
      color: #1F3D2C;
    }

    .ca-no-plan {
      background: #fff8f5;
      border: 1px solid rgba(125,42,3,0.2);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: #7D2A03;
      margin-top: 12px;
      display: none;
    }

    .ca-no-plan a {
      color: #7D2A03;
      font-weight: 600;
    }

    /* ── Body ── */
    .ca-body {
      max-width: 460px;
      margin: 24px auto 0;
      padding: 0 24px;
    }

    /* Two-tone heading */
    .ca-heading {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      color: #1F3D2C;
      margin: 0 0 6px;
      line-height: 1.15;
    }

    .ca-heading-italic {
      font-size: 1.5rem;
      font-weight: 300;
      font-style: italic;
      display: block;
      color: #6B756B;
    }

    .ca-heading-main {
      font-size: 2.2rem;
    }

    .ca-subheading {
      font-size: 15px;
      color: #6B756B;
      line-height: 1.65;
      margin: 12px 0 20px;
    }

    .error-msg {
      color: #c0392b;
      font-size: 0.875rem;
      margin-bottom: 12px;
      min-height: 20px;
    }

    .login-link {
      text-align: center;
      font-size: 0.875rem;
      color: #6B756B;
      margin-top: 20px;
    }

    .login-link a {
      color: #2D6B4F;
      text-decoration: none;
    }

    @media (max-width: 520px) {
      .ca-heading-italic { font-size: 1.25rem; }
      .ca-heading-main   { font-size: 1.75rem; }
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
</head>
<body class="create-account-page">

  <div class="ca-header">
    <img src="/logo-full-transparent.png" alt="Done For You Marketing" class="ca-logo">
    <a href="/signup" class="ca-back">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Change plan
    </a>
    <p class="ca-selected-plan" id="selectedPlanText" style="display:none;">
      Your selected plan: <strong id="selectedPlanName"></strong>
    </p>
    <div class="ca-no-plan" id="noPlanWarning">
      No plan selected. <a href="/signup">Go back and choose a plan →</a>
    </div>
  </div>

  <div class="ca-body">

    <h1 class="ca-heading">
      <span class="ca-heading-italic">You're almost there —</span>
      <span class="ca-heading-main">Create your account</span>
    </h1>
    <p class="ca-subheading">Welcome to Done For You Marketing! Fill in your details below and let's get started!</p>

    <div class="field">
      <label>Business name</label>
      <input type="text" id="business_name" placeholder="Bloom Wellness" />
    </div>

    <div class="field">
      <label>Full name</label>
      <input type="text" id="name" placeholder="Jane Smith" />
    </div>

    <div class="field">
      <label>Business email</label>
      <input type="email" id="email" placeholder="jane@yourbusiness.com" />
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" />
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="btn-primary" id="submitBtn" onclick="handleSignup()">
      Create your account →
    </button>

    <p class="login-link">Already have an account? <a href="/login">Sign in</a></p>
  </div>

  <script>
    const priceId   = sessionStorage.getItem('dfy_price_id');
    const planName  = sessionStorage.getItem('dfy_plan_name');
    const planPrice = sessionStorage.getItem('dfy_plan_price');

    if (!priceId) {
      document.getElementById('noPlanWarning').style.display = 'block';
      document.getElementById('submitBtn').disabled = true;
    } else {
      const planText = document.getElementById('selectedPlanText');
      planText.style.display = 'block';
      document.getElementById('selectedPlanName').textContent = planName;
    }

    async function handleSignup() {
      const business_name = document.getElementById('business_name').value.trim();
      const name          = document.getElementById('name').value.trim();
      const email         = document.getElementById('email').value.trim();
      const password      = document.getElementById('password').value;
      const errorMsg      = document.getElementById('errorMsg');
      const btn           = document.getElementById('submitBtn');

      errorMsg.textContent = '';

      if (!priceId) {
        errorMsg.textContent = 'No plan selected. Please go back and choose a plan.';
        return;
      }

      if (!business_name || !name || !email || !password) {
        errorMsg.textContent = 'Please fill in all fields.';
        return;
      }

      if (password.length < 8) {
        errorMsg.textContent = 'Password must be at least 8 characters.';
        return;
      }

      btn.textContent = 'Loading…';
      btn.disabled = true;

      try {
        const res = await fetch('/api/stripe/create-checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ business_name, name, email, password, priceId, addons: [] })
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.error || 'Something went wrong.';
          btn.textContent = 'Create your account →';
          btn.disabled = false;
          return;
        }

        sessionStorage.removeItem('dfy_price_id');
        sessionStorage.removeItem('dfy_plan_name');
        sessionStorage.removeItem('dfy_plan_price');
        window.location.href = data.url;

      } catch (err) {
        errorMsg.textContent = 'Network error. Please try again.';
        btn.textContent = 'Create your account →';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
