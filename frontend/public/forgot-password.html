<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — DFY Marketing</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <style>
    .login-page { flex-direction: column; gap: 0; }
    .login-brand { margin-bottom: 0; padding-top: 48px; }
  </style>
</head>
<body class="login-page">

  <div class="login-brand">
    <a href="/"><img src="/logo-full-transparent.png" alt="DFY Marketing" class="brand-logo" style="height:250px;"></a>
  </div>

  <div class="login-container">
    <form class="login-form" id="forgotForm">
      <h1 class="login-title">Reset password</h1>
      <p class="login-subtitle">Enter your email and we'll send you a reset link.</p>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg" style="display:none;background:#e8f4ef;color:#2D6B4F;padding:12px 14px;border-radius:6px;font-size:0.9rem;margin-bottom:12px;"></div>

      <button type="submit" class="btn-primary" id="submitBtn">Send reset link</button>

      <div class="login-back">
        <a href="/login.html" class="login-back-link">← Back to sign in</a>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const btn = document.getElementById('submitBtn');

      btn.textContent = 'Sending…';
      btn.disabled = true;
      errorMsg.textContent = '';
      successMsg.style.display = 'none';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.error || 'Something went wrong.';
          btn.textContent = 'Send reset link';
          btn.disabled = false;
          return;
        }

        successMsg.textContent = 'If that email is on file, a reset link is on its way. Check your inbox.';
        successMsg.style.display = 'block';
        document.getElementById('forgotForm').querySelector('button').style.display = 'none';
        document.getElementById('email').disabled = true;

      } catch (err) {
        errorMsg.textContent = 'Something went wrong. Try again.';
        btn.textContent = 'Send reset link';
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
