<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #F5F2EA;
      color: #6B756B;
      min-height: 100vh;
      display: flex;

    }

    /* ── NAV ── */
    .lp-nav {
      background: #fff;
      border-bottom: 1px solid rgba(31,61,44,0.10);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-wordmark {
      display: flex;
      align-items: baseline;
      gap: 7px;
      text-decoration: none;
    }
    .nav-wordmark-serif {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 19px;
      font-weight: 600;
      color: #1F3D2C;
    }
    .nav-wordmark-sans {
      font-size: 10px;
      font-weight: 600;
      color: #2D6B4F;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    /* ── MAIN LAYOUT ── */
    .lp-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 24px 80px;
    }

    .lp-content {
      width: 100%;
      max-width: 820px;
      text-align: center;
    }

    /* Eyebrow */
    .lp-eyebrow {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      color: #7D2A03;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    /* Headline */
    .lp-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 42px;
      font-weight: 400;
      color: #1F3D2C;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 18px;
    }
    .lp-headline em {
      font-style: italic;
      font-weight: 300;
    }

    /* Subheading */
    .lp-subhead {
      font-size: 16px;
      color: #6B756B;
      line-height: 1.6;
      margin-bottom: 48px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Form card */
    .lp-form-card {
      background: #fff;
      border: 1px solid rgba(31,61,44,0.09);
      border-radius: 18px;
      padding: 32px 20px 28px;
      box-shadow: 0 4px 32px rgba(31,61,44,0.08);
      text-align: left;
    }

    /* GHL embed sizing */
    #bZuzSMRBrVDf20iVNRkA {
      width: 100%;
      min-height: 500px;
      display: block;
    }

    /* ── FOOTER ── */
    .lp-footer {
      background: #1F3D2C;
      padding: 24px 40px;
      text-align: center;
    }
    .lp-footer p {
      font-size: 12px;
      color: rgba(245,242,234,0.45);
    }
    .lp-footer a {
      color: rgba(235,201,155,0.7);
      text-decoration: none;
    }
    .lp-footer a:hover { color: #EBC99B; }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .lp-main { padding: 40px 16px 60px; }
      .lp-headline { font-size: 30px; }
      .lp-subhead { font-size: 14px; margin-bottom: 32px; }
      .lp-form-card { padding: 28px 20px 24px; border-radius: 14px; }
    }

  <nav class="lp-nav">
