<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome! — Done For You Marketing</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">
  <div class="login-container" style="text-align: center;">
    <div class="brand-mark">DFY</div>
    <div style="margin-top: 48px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 48px 36px;">
      <div style="font-size: 3rem; margin-bottom: 16px;">🎉</div>
      <h1 style="font-family: 'DM Serif Display', serif; font-size: 1.8rem; font-weight: 400; margin-bottom: 12px;">You're in!</h1>
      <p style="color: var(--text-muted); margin-bottom: 32px; line-height: 1.6;">
        Your account has been created and your subscription is active.<br />
        Welcome to Done For You Marketing!
      </p>
      <a href="/" class="btn-primary" style="display: inline-block; text-decoration: none; width: auto; padding: 12px 32px;">
        Go to your dashboard →
      </a>
    </div>
  </div>
</body>
</html>
